<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 720" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1040" height="720" fill="#ffffff"/>
  <text x="520" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">Svazarm Button — Schéma zapojení</text>

  <!-- ===== AC zone ===== -->
  <rect x="24" y="58" width="372" height="506" rx="10" fill="#fdecea" stroke="#d32f2f" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="44" y="86" font-size="16" font-weight="700" fill="#b71c1c">⚠ 230 V AC — NEBEZPEČÍ</text>
  <text x="44" y="104" font-size="11" fill="#b71c1c">Jen kvalifikované osoby · životu nebezpečné napětí</text>

  <!-- ===== DC zone ===== -->
  <rect x="452" y="58" width="564" height="506" rx="10" fill="#e9f7ec" stroke="#2e7d32" stroke-width="2"/>
  <text x="472" y="86" font-size="16" font-weight="700" fill="#1b5e20">5 V / 3.3 V DC — SELV (bezpečné na dotek)</text>
  <text x="472" y="104" font-size="11" fill="#1b5e20">Galvanicky oddělené od sítě</text>

  <!-- isolation barrier -->
  <line x1="424" y1="66" x2="424" y2="556" stroke="#555" stroke-width="2" stroke-dasharray="9 6"/>
  <text x="412" y="312" font-size="12" font-weight="600" fill="#555" transform="rotate(-90 412 312)" text-anchor="middle">GALVANICKÉ ODDĚLENÍ  ~3 kVAC</text>

  <!-- mains entry -->
  <text x="58" y="150" font-size="12" font-weight="600" fill="#444">SÍŤ</text>
  <circle cx="64" cy="182" r="5" fill="#7a4a1e"/>
  <text x="44" y="186" font-size="12" font-weight="700" fill="#7a4a1e">L</text>
  <circle cx="64" cy="476" r="5" fill="#1e63c8"/>
  <text x="44" y="480" font-size="12" font-weight="700" fill="#1e63c8">N</text>

  <!-- Live wire + fuse -->
  <polyline points="64,182 150,182" fill="none" stroke="#7a4a1e" stroke-width="3"/>
  <rect x="150" y="167" width="80" height="30" rx="3" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <text x="190" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#222">F1  T0,5A</text>
  <polyline points="230,182 300,182" fill="none" stroke="#7a4a1e" stroke-width="3"/>

  <!-- Neutral wire -->
  <polyline points="64,476 300,476" fill="none" stroke="#1e63c8" stroke-width="3"/>

  <!-- MOV (optional) across L-N -->
  <line x1="262" y1="182" x2="262" y2="476" stroke="#9c27b0" stroke-width="2" stroke-dasharray="5 4"/>
  <rect x="247" y="312" width="30" height="36" rx="3" fill="#f6eafa" stroke="#9c27b0" stroke-width="1.2"/>
  <text x="262" y="300" text-anchor="middle" font-size="10" fill="#9c27b0">MOV</text>
  <text x="262" y="364" text-anchor="middle" font-size="9" fill="#9c27b0">(volit.)</text>

  <!-- HLK-PM01 -->
  <rect x="300" y="150" width="96" height="358" rx="5" fill="#cfd4da" stroke="#333" stroke-width="1.5"/>
  <text x="348" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">HLK-PM01</text>
  <text x="348" y="338" text-anchor="middle" font-size="10" fill="#333">230 V AC</text>
  <text x="348" y="352" text-anchor="middle" font-size="11" fill="#333">▼</text>
  <text x="348" y="366" text-anchor="middle" font-size="10" fill="#333">5 V DC</text>
  <!-- HLK AC terminals -->
  <circle cx="300" cy="182" r="4" fill="#7a4a1e"/>
  <circle cx="300" cy="476" r="4" fill="#1e63c8"/>
  <text x="312" y="172" font-size="10" fill="#333">L</text>
  <text x="312" y="492" font-size="10" fill="#333">N</text>
  <!-- HLK DC terminals -->
  <circle cx="396" cy="212" r="4" fill="#e03030"/>
  <circle cx="396" cy="430" r="4" fill="#222"/>
  <text x="372" y="204" text-anchor="end" font-size="10" fill="#333">Vo+</text>
  <text x="372" y="446" text-anchor="end" font-size="10" fill="#333">Vo−</text>

  <!-- ===== DC side wiring ===== -->
  <!-- +5V -->
  <polyline points="396,212 500,212 500,184 540,184" fill="none" stroke="#e03030" stroke-width="3"/>
  <!-- Vo- to GND bus -->
  <polyline points="396,430 500,430 500,612" fill="none" stroke="#222" stroke-width="3"/>

  <!-- ESP32 -->
  <rect x="540" y="150" width="160" height="250" rx="8" fill="#2b3a55" stroke="#16203a" stroke-width="2"/>
  <text x="620" y="266" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">ESP32</text>
  <text x="620" y="286" text-anchor="middle" font-size="11" fill="#cdd6e6">DevKitC (38pinů)</text>
  <!-- ESP32 left pins -->
  <circle cx="540" cy="184" r="5" fill="#e03030"/>
  <text x="552" y="180" font-size="11" font-weight="600" fill="#ffffff">5V</text>
  <circle cx="540" cy="250" r="5" fill="#222" stroke="#fff" stroke-width="1"/>
  <text x="552" y="246" font-size="11" font-weight="600" fill="#ffffff">GND</text>
  <!-- ESP32 right pins -->
  <circle cx="700" cy="212" r="5" fill="#f5a623"/>
  <text x="688" y="208" text-anchor="end" font-size="11" font-weight="600" fill="#ffffff">GPIO26</text>
  <circle cx="700" cy="332" r="5" fill="#f5a623"/>
  <text x="688" y="328" text-anchor="end" font-size="11" font-weight="600" fill="#ffffff">GPIO27</text>
  <!-- ESP32 GND drop to bus -->
  <polyline points="540,250 524,250 524,612" fill="none" stroke="#222" stroke-width="3"/>

  <!-- LED branch -->
  <polyline points="700,212 760,212" fill="none" stroke="#f5a623" stroke-width="3"/>
  <rect x="760" y="198" width="70" height="28" rx="3" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <text x="795" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#222">330 Ω</text>
  <polyline points="830,212 876,212" fill="none" stroke="#f5a623" stroke-width="3"/>
  <!-- LED glyph (anode triangle -> cathode bar) -->
  <polygon points="878,199 878,225 902,212" fill="#e03030" stroke="#9b1c1c" stroke-width="1"/>
  <line x1="902" y1="197" x2="902" y2="227" stroke="#9b1c1c" stroke-width="3"/>
  <text x="889" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a1a">LED</text>
  <text x="889" y="246" text-anchor="middle" font-size="9" fill="#666">D1</text>
  <!-- LED cathode to GND bus -->
  <polyline points="902,212 944,212 944,612" fill="none" stroke="#222" stroke-width="3"/>

  <!-- Button branch -->
  <polyline points="700,332 770,332" fill="none" stroke="#f5a623" stroke-width="3"/>
  <circle cx="772" cy="332" r="4" fill="#333"/>
  <circle cx="820" cy="332" r="4" fill="#333"/>
  <line x1="772" y1="332" x2="816" y2="316" stroke="#333" stroke-width="2.5"/>
  <text x="796" y="364" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a1a">SW1 (tlač.)</text>
  <polyline points="820,332 944,332" fill="none" stroke="#f5a623" stroke-width="3"/>

  <!-- GND bus -->
  <line x1="490" y1="612" x2="980" y2="612" stroke="#222" stroke-width="5"/>
  <text x="735" y="636" text-anchor="middle" font-size="12" font-weight="600" fill="#222">GND / 0 V  —  společná, oddělená od sítě (NESPOJOVAT s PE)</text>

  <!-- ===== Legend ===== -->
  <g font-size="12" fill="#222">
    <line x1="44" y1="600" x2="78" y2="600" stroke="#7a4a1e" stroke-width="4"/>
    <text x="84" y="604">Fáze (L)</text>
    <line x1="44" y1="624" x2="78" y2="624" stroke="#1e63c8" stroke-width="4"/>
    <text x="84" y="628">Nulák (N)</text>
    <line x1="190" y1="600" x2="224" y2="600" stroke="#e03030" stroke-width="4"/>
    <text x="230" y="604">+5 V</text>
    <line x1="190" y1="624" x2="224" y2="624" stroke="#f5a623" stroke-width="4"/>
    <text x="230" y="628">GPIO / signál 3,3 V</text>
    <line x1="372" y1="612" x2="406" y2="612" stroke="#222" stroke-width="4"/>
    <text x="412" y="616">GND (0 V)</text>
  </g>

  <!-- notes -->
  <text x="44" y="672" font-size="11" fill="#444">Pozn.: 330 Ω s červenou/žlutou/zelenou LED · pojistka ve fázi · MOV volitelně · NIKDY nepřipojovat USB a síť současně · síťové části zakrytovat.</text>
  <text x="44" y="690" font-size="11" fill="#444">Piny podle potisku, ne polohy · dodrž ≥ 6–8 mm vzdálenost mezi sítí a SELV.</text>
</svg>
