<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">Svazarm Button — Wiring Schematic</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">5 V / 3.3 V DC · SELV — powered over USB-C, no mains voltage</text>

  <!-- SELV panel -->
  <rect x="24" y="76" width="912" height="372" rx="10" fill="#e9f7ec" stroke="#2e7d32" stroke-width="2"/>

  <!-- USB-C connector -->
  <text x="96" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">USB-C</text>
  <rect x="48" y="208" width="96" height="46" rx="23" fill="#2b3a55" stroke="#16203a" stroke-width="2"/>
  <rect x="60" y="223" width="72" height="16" rx="8" fill="#4a5d80"/>
  <text x="96" y="278" text-anchor="middle" font-size="10" fill="#444">5 V power in</text>
  <text x="96" y="292" text-anchor="middle" font-size="9" fill="#666">(charger / power bank)</text>
  <!-- USB-C output terminals -->
  <circle cx="144" cy="223" r="4" fill="#e03030"/>
  <circle cx="144" cy="240" r="4" fill="#222"/>
  <text x="150" y="219" font-size="9" fill="#333">VBUS +5V</text>
  <text x="150" y="252" font-size="9" fill="#333">GND</text>

  <!-- VBUS wire -->
  <polyline points="144,223 236,223 236,196 300,196" fill="none" stroke="#e03030" stroke-width="3"/>
  <!-- USB GND to bus -->
  <polyline points="144,240 200,240 200,396" fill="none" stroke="#222" stroke-width="3"/>

  <!-- ESP32 -->
  <rect x="300" y="150" width="180" height="230" rx="8" fill="#2b3a55" stroke="#16203a" stroke-width="2"/>
  <text x="390" y="258" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">ESP32</text>
  <text x="390" y="278" text-anchor="middle" font-size="11" fill="#cdd6e6">DevKitC (38-pin)</text>
  <!-- left pins -->
  <circle cx="300" cy="196" r="5" fill="#e03030"/>
  <text x="312" y="192" font-size="11" font-weight="600" fill="#ffffff">5V</text>
  <circle cx="300" cy="256" r="5" fill="#222" stroke="#fff" stroke-width="1"/>
  <text x="312" y="252" font-size="11" font-weight="600" fill="#ffffff">GND</text>
  <!-- right pins -->
  <circle cx="480" cy="205" r="5" fill="#f5a623"/>
  <text x="468" y="201" text-anchor="end" font-size="11" font-weight="600" fill="#ffffff">GPIO26</text>
  <circle cx="480" cy="320" r="5" fill="#f5a623"/>
  <text x="468" y="316" text-anchor="end" font-size="11" font-weight="600" fill="#ffffff">GPIO27</text>
  <!-- ESP32 GND drop to bus -->
  <polyline points="300,256 284,256 284,396" fill="none" stroke="#222" stroke-width="3"/>

  <!-- LED branch -->
  <polyline points="480,205 548,205" fill="none" stroke="#f5a623" stroke-width="3"/>
  <rect x="548" y="191" width="70" height="28" rx="3" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <text x="583" y="209" text-anchor="middle" font-size="11" font-weight="600" fill="#222">330 Ω</text>
  <polyline points="618,205 666,205" fill="none" stroke="#f5a623" stroke-width="3"/>
  <polygon points="668,192 668,218 692,205" fill="#e03030" stroke="#9b1c1c" stroke-width="1"/>
  <line x1="692" y1="190" x2="692" y2="220" stroke="#9b1c1c" stroke-width="3"/>
  <text x="679" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a1a">LED</text>
  <text x="679" y="240" text-anchor="middle" font-size="9" fill="#666">D1</text>
  <polyline points="692,205 740,205 740,396" fill="none" stroke="#222" stroke-width="3"/>

  <!-- Button branch -->
  <polyline points="480,320 556,320" fill="none" stroke="#f5a623" stroke-width="3"/>
  <circle cx="558" cy="320" r="4" fill="#333"/>
  <circle cx="606" cy="320" r="4" fill="#333"/>
  <line x1="558" y1="320" x2="602" y2="304" stroke="#333" stroke-width="2.5"/>
  <text x="582" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a1a">SW1 (push)</text>
  <polyline points="606,320 740,320" fill="none" stroke="#222" stroke-width="3"/>

  <!-- GND bus -->
  <line x1="180" y1="396" x2="800" y2="396" stroke="#222" stroke-width="5"/>
  <text x="490" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#222">GND / 0 V — common ground</text>

  <!-- Legend -->
  <g font-size="12" fill="#222">
    <line x1="60" y1="476" x2="94" y2="476" stroke="#e03030" stroke-width="4"/>
    <text x="100" y="480">+5 V (VBUS)</text>
    <line x1="240" y1="476" x2="274" y2="476" stroke="#f5a623" stroke-width="4"/>
    <text x="280" y="480">GPIO / 3.3 V signal</text>
    <line x1="470" y1="476" x2="504" y2="476" stroke="#222" stroke-width="4"/>
    <text x="510" y="480">GND (0 V)</text>
  </g>

  <!-- notes -->
  <text x="60" y="514" font-size="11" fill="#444">Notes: 330 Ω with a red/yellow/green LED · the board's USB-C port both powers and programs it · only VBUS (+5 V) and GND are used.</text>
  <text x="60" y="532" font-size="11" fill="#444">If using a separate USB-C panel jack, wire VBUS → 5V pin and GND → GND. Pins by silkscreen label, not position.</text>
</svg>
